{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">

                    <h2>Contact Us</h2>

                </div>

                <div class="card-body">

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Enter your name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Email

                            </label>

                            <input
                                type="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Subject

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                placeholder="Subject"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Message

                            </label>

                            <textarea
                                class="form-control"
                                rows="6"
                                placeholder="Write your message here..."
                                required></textarea>

                        </div>

                        <div class="d-grid">

                            <button
                                class="btn btn-success btn-lg"
                                type="submit">

                                Send Message

                            </button>

                        </div>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <h5>AI Personalized Career Guidance System</h5>

                    <p>Email: support@careerguide.com</p>

                    <p>Phone: +91 9876543210</p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
