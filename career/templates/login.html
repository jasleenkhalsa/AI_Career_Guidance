{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-5">

        <div class="card shadow-lg border-0">

            <div class="card-header bg-success text-white text-center">

                <h3>Student Login</h3>

            </div>

            <div class="card-body">
            
            {% if error %}
            <div class="alert alert-danger">
               {{ error }}
            </div>
            {% endif %}
            

                <form method="POST">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Email Address

                        </label>

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            name="password"
                            placeholder="Enter Password"
                            required>

                    </div>

                    <div class="d-grid">

                        <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                            Login

                        </button>

                    </div>

                </form>

                <hr>

                <div class="text-center">

                    <a href="#">

                        Forgot Password?

                    </a>

                </div>

            </div>

            <div class="card-footer text-center">

                Don't have an account?

                <a href="/register/">

                    Register

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
